{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MorphoWrite{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    {% comment %} <link rel="stylesheet" href="{% static 'css/styles.css' %}"> {% endcomment %}
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 py-4 px-6 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-bold tracking-tight text-indigo-600">MorphoWrite</a>
            <nav class="space-x-4">
                <a href="/about/" class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition">About</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto p-6">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-slate-200 py-4 text-center text-xs text-slate-400">
        &copy; {% now "Y" %} MorphoWrite. Built for clarity.
    </footer>

</body>
</html>
